services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_APPWRITE_PROJECT_ID: ${VITE_PUBLIC_APPWRITE_PROJECT_ID}
        VITE_PUBLIC_APPWRITE_PROJECT_NAME: ${VITE_PUBLIC_APPWRITE_PROJECT_NAME}
        VITE_PUBLIC_APPWRITE_ENDPOINT: ${VITE_PUBLIC_APPWRITE_ENDPOINT}
        VITE_PUBLIC_APPWRITE_DATABASE_ID: ${VITE_PUBLIC_APPWRITE_DATABASE_ID}
        VITE_PUBLIC_APPWRITE_BUCKET: ${VITE_PUBLIC_APPWRITE_BUCKET}
        VITE_PUBLIC_APP_ORIGIN: ${VITE_PUBLIC_APP_ORIGIN}
        API_WORKLOADHUB_ORIGIN: ${API_WORKLOADHUB_ORIGIN}
    image: workloadhub-app:${APP_IMAGE_TAG:-latest}
    container_name: workloadhub-green
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,nosuid,nodev,noexec,size=64m,mode=0755
      - /var/run:rw,nosuid,nodev,noexec,size=16m,mode=0755
      - /var/log/nginx:rw,nosuid,nodev,noexec,size=16m,mode=0755
      - /tmp:rw,nosuid,nodev,noexec,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      wh_green_net:
        aliases:
          - workloadhub-green
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

networks:
  wh_green_net:
    external: true
